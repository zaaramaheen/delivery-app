<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Delivery</title>
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            line-height: 1.6;
            background-color: #e6f7ff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0077b6;
            font-size: 36px;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .form-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        label {
            font-weight: bold;
            color: #023e8a;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #90e0ef;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', sans-serif;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #0077b6;

        }

        button {
            width: 100%;
            padding: 12px;
            background: #0096c7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0077b6;
        }

        .qty-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            gap: 8px;
        }

        .qty-box label {
            flex: 1;
            white-space: nowrap;
            font-size: 16px;
        }

        .qty-controls {
            width: 110px;
            min-width: 110px;
            display: flex;
            justify-content: center;
            align-items: center;

        }


        .add-btn {
            width: 100px;
            min-width: 100px;
            height: 45px;
            padding: 0;
        }

        .counter {
            width: 130px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .counter span {
            width: 30px;
            text-align: center;
            font-weight: bold;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            flex-shrink: 0;
        }
    </style>

</head>

<body>
    <div class="form-container">
        <h1>Delivery Entry Form</h1>
        <label>Name</label>
        <br>
        <input id="nameInput" type="text" placeholder="Enter Your Name">
        <br><br>
        <label>Phone Number</label>
        <br>
        <input id="phoneInput" type="text" placeholder="Enter Your Phone Number">
        <br><br>
        <label>Apartment Name</label>
        <br>
        <select id="apartmentInput">
            <option value="">Select Apartment</option>
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="A3">A3</option>
            <option value="A4">A4</option>
            <option value="A5">A5</option>
            <option value="A6">A6</option>
            <option value="A7">A7</option>
            <option value="A8">A8</option>
            <option value="A9">A9</option>
            <option value="A10">A10</option>
            <option value="A11">A11</option>
            <option value="A12">A12</option>
        </select>
        <br><br>
        <label>Plot Number</label>
        <br>
        <input id="plotInput" type="text" placeholder="Enter Plot Number">
        <br><br>
        <h3>Water Brands</h3>
        <div class="qty-controls" id="bisleri20Controls">
            <label>Bisleri 20L - ₹120</label>
            <button type="button" class="add-btn" onclick="addProduct('bisleri20Qty', 'bisleri20Controls')">ADD</button>
            <div class="counter" style="display:none;">
                <button type="button" class="qty-btn"
                    onclick="changeQty('bisleri20Qty', 'bisleri20Controls', -1)">-</button>
                <span id="bisleri20Qty">1</span>
                <button type="button" class="qty-btn"
                    onclick="changeQty('bisleri20Qty', 'bisleri20Controls', 1)">+</button>
            </div>
        </div>
        <div class="qty-controls" id="tata20Controls">
            <label>TATA 20L - ₹90</label>

            <button type="button" class="add-btn" onclick="addProduct('tata20Qty','tata20Controls')">ADD</button>
            <div class="counter" style="display:none;">
                <button type="button" class="qty-btn" onclick="changeQty('tata20Qty', 'tata20Controls', -1)">-</button>
                <span id="tata20Qty">1</span>
                <button type="button" class="qty-btn" onclick="changeQty('tata20Qty', 'tata20Controls', 1)">+</button>
            </div>
        </div>
        <div class="qty-controls" id="bailey20Controls">
            <label>Bailey 20L - ₹85</label>

            <button type="button" class="add-btn" onclick="addProduct('bailey20Qty', 'bailey20Controls')">ADD</button>
            <div class="counter" style="display:none;">
                <button type="button" class="qty-btn"
                    onclick="changeQty('bailey20Qty', 'bailey20Controls', -1)">-</button>
                <span id="bailey20Qty">1</span>
                <button type="button" class="qty-btn"
                    onclick="changeQty('bailey20Qty', 'bailey20Controls', 1)">+</button>
            </div>
        </div>
        <div class="qty-controls" id="aquaKelvin20Controls">
            <label>Aqua Kelvin 20L - ₹60</label>

            <button type="button" class="add-btn"
                onclick="addProduct('aquaKelvin20Qty', 'aquaKelvin20Controls')">ADD</button>
            <div class="counter" style="display:none;">
                <button type="button" class="qty-btn"
                    onclick="changeQty('aquaKelvin20Qty', 'aquaKelvin20Controls', -1)">-</button>
                <span id="aquaKelvin20Qty">1</span>
                <button type="button" class="qty-btn"
                    onclick="changeQty('aquaKelvin20Qty', 'aquaKelvin20Controls', 1)">+</button>
            </div>
        </div>
        <div class="qty-controls" id="aquaKelvin1Controls">
            <label>Aqua Kelvin 1L</label>
            <button type="button" class="add-btn"
                onclick="addProduct('aquaKelvin1Qty', 'aquaKelvin1Controls')">ADD</button>
            <div class="counter" style="display:none;">
                <button type="button" class="qty-btn"
                    onclick="changeQty('aquaKelvin1Qty', 'aquaKelvin1Controls', -1)">-</button>
                <span id="aquaKelvin1Qty">1</span>
                <button type="button" class="qty-btn"
                    onclick="changeQty('aquaKelvin1Qty', 'aquaKelvin1Controls', 1)">+</button>
            </div>
        </div>
        <div class="qty-controls" id="aquaKelvin500Controls">
            <label>Aqua Kelvin 500mL</label>
            <button type="button" class="add-btn"
                onclick="addProduct('aquaKelvin500Qty', 'aquaKelvin500Controls')">ADD</button>
            <div class="counter" style="display:none;">
                <button type="button" class="qty-btn"
                    onclick="changeQty('aquaKelvin500Qty', 'aquaKelvin500Controls', -1)">-</button>
                <span id="aquaKelvin500Qty">1</span>
                <button type="button" class="qty-btn"
                    onclick="changeQty('aquaKelvin500Qty', 'aquaKelvin500Controls', 1)">+</button>
            </div>
        </div>
        <h3>Delivery Type</h3>
        <div class="delivery-option">
            <input type="radio" id="deliverNow" name="deliveryType" value="now">
            <label for="deliverNow">Deliver Now</label>
            <input type="radio" id="slotBooking" name="deliverytype" value="slot">
            <label for="slotBooking">Slot Booking</label>
        </div>
        <br>
        <div id="slotSection" style="display:none;">
            <h3>Slot Booking</h3>
            <label for="deliveryDate">Select Date</label>
            <input id="deliveryDate" type="date">
            <label for="deliveryTime">Select Delivery Slot</label>
            <select id="deliverySlot">
                <option value="">Choose Slot</option>
                <option>6:00 AM - 9:00 AM</option>
                <option>9:00 AM - 12:00 AM</option>
                <option>12:00 AM - 3:00 AM</option>
                <option>3:00 AM - 6:00 AM</option>
                <option>6:00 AM - 8:00 AM</option>
            </select>
        </div>
        <br>
        <button id="placeOrderBtn" type="button">Place Order</button>
        <div id="confirmationMessage"></div>
        <h3>Order Summary</h3>
        <div id="orderSummary">No items selected</div>
    </div>
    <script>
        function addProduct(qtyId, controlsId) {
            const controls = document.getElementById(controlsId);
            const quantity = document.getElementById(qtyId);

            quantity.innerText = 1;

            controls.querySelector(".add-btn").style.display = "none";
            controls.querySelector(".counter").style.display = "flex";
        }

        function changeQty(qtyId, controlsId, change) {
            const controls = document.getElementById(controlsId);
            const quantity = document.getElementById(qtyId);

            let value = parseInt(quantity.innerText) || 0;
            value += change;

            if (value <= 0) {
                quantity.innerText = 0;
                controls.querySelector(".counter").style.display = "none";
                controls.querySelector(".add-btn").style.display = "block";
            } else {
                quantity.innerText = value;
            }
        }
    </script>
</body>

</html>
