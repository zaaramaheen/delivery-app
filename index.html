<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Delivery</title>
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            line-height: 1.6;
            background-color: #e6f7ff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0077b6;
            font-size: 36px;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .form-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        label {
            font-weight: bold;
            color: #023e8a;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #90e0ef;
            border-radius: 8px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #0077b6;

        }

        button {
            width: 100%;
            padding: 12px;
            background: #0096c7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0077b6;
        }
    </style>

</head>

<body>
    <div class="form-container">
        <h1>Delivery Entry Form</h1>
        <label>Name</label>
        <br>
        <input id="nameInput" type="text" placeholder="Enter Your Name">
        <br><br>
        <label>Phone Number</label>
        <br>
        <input id="phoneInput" type="text" placeholder="Enter Your Phone Number">
        <br><br>
        <label>Plot Number</label>
        <br>
        <input id="plotInput" type="text" placeholder="Enter Plot Number">
        <br><br>
        <label>Road Number</label>
        <br>
        <input id="roadInput" type="text" placeholder="Enter Road Number">
        <br><br>
        <label>Area / Colony</label>
        <br>
        <input id="areaInput" type="text" placeholder="Enter Area / Colony">
        <br><br>
        <label>Landmark(Optional)</label>
        <input id="landmarkInput" type="text" placeholder="Enter Landmark">
        <br><br>
        <button id="continueBtn" type="button">Continue</button>
        <script src="script.js"></script>
    </div>
</body>

</html>
