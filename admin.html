<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: "Trebuchet MS", sans-serif;
            background: #e6f7ff;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #0077b6;
        }

        .order {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .deliver-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            margin-top: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .deliver-btn:hover {
            opacity: 0.9;
            background-color: #218838;
        }

        #pendingFilterBtn {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #pendingFilterBtn:hover {
            opacity: 0.9;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-left: 10px;
            display: inline-block;
        }

        .whatsapp-btn:hover {
            opacity: 0.9;
        }

        .order-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .status.pending {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffe08a;
        }

        .status.delivered {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #9fd8b3;
        }

        #logoutBtn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            float: right;
            margin: 10px;
            transition: background-color 0.3s;
        }

        #logoutBtn:hover {
            background-color: #c0392b;
        }

        .delete-btn {
            background: #e53935;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 8px;
        }

        .delete-btn:hover {
            background: #c62828;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 180px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #555;
        }

        .card span {
            font-size: 28px;
            font-weight: bold;
            color: #007bff;
        }

        .delete-all-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0 20px 0;
            transition: background 0.2s ease;
        }

        .delete-all-btn:hover {
            background: #c82333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Water Orders Admin Panel</h1>
        <button id="logoutBtn">Logout</button>
        <h2>Dashboard</h2>
        <div class="dashboard">
            <div class="card">
                <h3>Total Orders</h3>
                <span id="totalOrders">0</span>
            </div>
            <div class="card">
                <h3>Pending Orders</h3>
                <span id="pendingOrders">0</span>
            </div>
            <div class="card">
                <h3>Delivered Orders</h3>
                <span id="deliveredOrders">0</span>
            </div>
        </div>
        <button id="clearDeliveredBtn" class="delete-all-btn">Clear Delivered Orders</button>
        <button id="pendingFilterBtn"></button>
        <div id="ordersContainer">No Orders Yet</div>
    </div>
    <script>
        if (localStorage.getItem("adminLoggedIn") !== "true") {
            window.location.href = "login.html";
        }
        const prices = {
            bisleri: 120,
            kinley: 130,
            aquaKelvin: 60,
            tata: 90,
            bailey: 85
        };
        let showPendingOnly = localStorage.getItem("showPendingOnly") === "true";
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("pendingFilterBtn").textContent =
                showPendingOnly ? "Show All Orders" : "Show Pending Only";
        });
        function loadOrders() {
            console.log("Loading orders...");
            fetch("https://delivery-app-ders.onrender.com/orders")
                .then(res => res.json())
                .then(data => {
                    let container = document.getElementById("ordersContainer");
                    const pendingOrders = data.filter(order => order.status === "Pending").length;
                    document.getElementById("totalOrders").textContent = data.length;
                    const deliveredOrders = data.filter(order => order.status === "Delivered").length;
                    document.getElementById("deliveredOrders").textContent = deliveredOrders;
                    document.getElementById("pendingOrders").textContent = pendingOrders;
                    if (data.length === 0) {
                        container.innerHTML = "No Orders Yet";
                        return;
                    }
                    container.innerHTML = "";
                    data.reverse();
                    const sortedOrders = [
                        ...data.filter(order => order.status === "Pending"),
                        ...data.filter(order => order.status === "Delivered")
                    ];
                    sortedOrders.forEach(order => {
                        if (showPendingOnly && order.status !== "Pending") {
                            return;
                        }
                        const orderTime = new Date(order.timestamp).toLocaleString("en-IN", {
                            day: "numeric",
                            month: "short",
                            year: "numeric",
                            hour: "numeric",
                            minute: "2-digit",
                            hour12: true
                        });
                        console.log("Type:", order.order.deliveryType);
                        console.log("Date:", order.order.deliveryDate);
                        console.log("Slot:", order.order.deliverySlot);
                        let total = 0;
                        Object.entries(order.order || {}).forEach(([item, qty]) => {
                            if (!prices[item]) return;
                            total += (prices[item] || 0) * Number(qty || 0);
                        });
                        container.innerHTML += `
                <div class="order">
                    <h3>${order.customer.name}</h3>
                    <p>📞 ${order.customer.phone}</p>
                    <p>📍 Plot ${order.customer.plot},
                        Road no. ${order.customer.road},
                        ${order.customer.area}
                        </p> 
                        <p><b>Ordered At:</b> ${orderTime}</p>
                        <h3>🧾 Order Details</h3>
                        <div class="order-items">
                            ${Object.entries(order.order || {})
                                .filter(([item, qty]) =>
                                    prices[item] && qty && qty !== "0"
                                )
                                .map(([item, qty]) => `<p>${item}: ${qty}</p>`)
                                .join("")
                            }
                            <p><b>Delivery:</b> ${order.order.deliveryType}</p>
                            ${order.order.deliveryType === "slot"
                                ? `
                            <p><b>Date:</b> ${order.order.deliveryDate}</p>
                            <p><b>Time:</b> ${order.order.deliverySlot}</p>
                            `
                                : ""
                            }
                            <p>🚚 Status:
                                <span class="status ${order.status.toLowerCase()}">
                                     ${order.status}
                                     </span>
                                     </p>
                            ${order.status === "Pending"
                                ? `
                            <div class="action-buttons">
                                <button class="deliver-btn" data-id="${order._id}">Mark Delivered</button>
                            <button class="delete-btn" data-id="${order._id}">Delete</button>
                            <a href="https://wa.me/91${order.customer.phone}" target="_blank" class="whatsapp-btn">
                                WhatsApp Customer
                                </a>
                                </div>
                                `
                                : `<p>✅ Delivered</p>`
                            }
                            <h3>Total: ₹${total}</h3>
                            </div>  
                    </div>
                    `;
                    });
                })
                .catch(err => console.log(err));
        }
        document.addEventListener("click", function (e) {
            if (e.target.classList.contains("deliver-btn")) {
                const id = e.target.getAttribute("data-id");
                console.log("Sending PATCH for:", id);
                fetch(`https://delivery-app-ders.onrender.com/order/${id}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json"
                    }
                })
                    .then(res => {
                        console.log("Response:", res.status);
                        location.reload();
                    })
                    .catch(err => console.log(err));
            }
            if (e.target.classList.contains("delete-btn")) {
                const id = e.target.getAttribute("data-id");
                if (confirm("Are you sure you want to delete this order?")) {
                    fetch(`https://delivery-app-ders.onrender.com/order/${id}`, {
                        method: "DELETE"
                    })
                        .then(res => {
                            console.log("Response: ", res.status);
                            location.reload();
                        })
                        .catch(err => console.log(err));
                }
            }
            if (e.target.id === "clearDeliveredBtn") {
                if (confirm("Delete all delivered orders?")) {
                    fetch("https://delivery-app-ders.onrender.com/orders/delivered", {
                        method: "DELETE"
                    })
                        .then(res => {
                            console.log("Response: ", res.status);
                            location.reload();
                        })
                        .catch(err => console.log(err));
                }
            }
        });
        document.getElementById("pendingFilterBtn").addEventListener("click", () => {
            localStorage.setItem(
                "showPendingOnly",
                localStorage.getItem("showPendingOnly") === "true" ? "false" : "true"
            );
            location.reload();
        });
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("adminLoggedIn");
            window.location.href = "login.html";
        });
        loadOrders();
        setInterval(loadOrders, 5000);
    </script>

</body>

</html>
